<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Job - Internship Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="{{ url_for('home') }}">Back to home</a>

      <section class="panel">
        <p class="eyebrow dark">Step 2</p>
        <h1 class="page-title">Add a job</h1>
        <p class="page-intro">
          This form sends data from the browser to Flask, then Flask saves it
          in the SQLite database.
        </p>

        <form class="job-form" method="post">
          <label for="company">Company</label>
          <input id="company" name="company" type="text" placeholder="Example: ABC Tech" required>

          <label for="role">Role</label>
          <input id="role" name="role" type="text" placeholder="Example: Frontend Intern" required>

          <label for="location">Location</label>
          <input id="location" name="location" type="text" placeholder="Example: Phnom Penh">

          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="Saved">Saved</option>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
          </select>

          <label for="deadline">Deadline</label>
          <input id="deadline" name="deadline" type="date">

          <label for="notes">Notes</label>
          <textarea
            id="notes"
            name="notes"
            rows="5"
            placeholder="Example: Sent CV today. Follow up next week."
          ></textarea>

          <button class="button form-button" type="submit">Save job</button>
        </form>
      </section>
    </main>
  </body>
</html>
