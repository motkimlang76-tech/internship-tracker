<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Job - Internship Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="{{ url_for('jobs') }}">Back to jobs</a>

      <section class="panel">
        <p class="eyebrow dark">Update application</p>
        <h1 class="page-title">Edit job</h1>
        <p class="page-intro">
          Update the status, deadline, notes, or company details for this job.
        </p>

        {% if error %}
          <p class="form-error">{{ error }}</p>
        {% endif %}

        <form class="job-form" method="post">
          <label for="company">Company</label>
          <input
            id="company"
            name="company"
            type="text"
            value="{{ job.company }}"
            required
          >

          <label for="role">Role</label>
          <input
            id="role"
            name="role"
            type="text"
            value="{{ job.role }}"
            required
          >

          <label for="location">Location</label>
          <input
            id="location"
            name="location"
            type="text"
            value="{{ job.location or '' }}"
          >

          <label for="website">Company website</label>
          <input
            id="website"
            name="website"
            type="text"
            inputmode="url"
            value="{{ job.website or '' }}"
          >

          <label for="salary">Salary</label>
          <input
            id="salary"
            name="salary"
            type="text"
            value="{{ job.salary or '' }}"
          >

          <label for="status">Status</label>
          <select id="status" name="status">
            {% for status in statuses %}
              <option value="{{ status }}" {% if job.status == status %}selected{% endif %}>
                {{ status }}
              </option>
            {% endfor %}
          </select>

          <label for="deadline">Deadline</label>
          <input
            id="deadline"
            name="deadline"
            type="date"
            value="{{ job.deadline or '' }}"
          >

          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="5">{{ job.notes or '' }}</textarea>

          <button class="button form-button" type="submit">Save changes</button>
        </form>
      </section>
    </main>
  </body>
</html>
